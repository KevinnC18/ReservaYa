<nav
    class="sticky top-0 z-50 bg-surface after:pointer-events-none after:absolute after:inset-x-0 after:bottom-0 after:h-px after:bg-white/10">
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">

                    class="relative inline-flex items-center justify-center rounded-md p-2 text-gray hover:bg-white/5 hover:text-light focus:outline-none">

                    <!-- Icono Hamburguesa (se oculta si está abierto) -->
                    <svg [class.hidden]="isMobileMenuOpen()" class="size-6" fill="none" viewBox="0 0 24 24"
                        stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                    <!-- Icono X (se muestra si está abierto) -->
                    <svg [class.hidden]="!isMobileMenuOpen()" class="size-6" fill="none" viewBox="0 0 24 24"
                        stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

                    </div>
                    <span class="text-light tracking-tight font-semibold text-[20px]">
                        Reserva<span class="text-primary">Ya</span>
                    </span>
                </div>

                <div class="hidden sm:ml-6 sm:flex items-center ">
                    <div class="flex space-x-5">
                        <a routerLink="/home" routerLinkActive="bg-primary text-light"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="rounded-full px-3 py-2 text-sm font-medium text-gray hover:text-light hover:scale-105 transition-all duration-300">
                            Inicio
                        </a>
                        <a routerLink="/busqueda" routerLinkActive="bg-primary text-light"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="rounded-full px-3 py-2 text-sm font-medium text-gray hover:scale-105 hover:text-light transition-all duration-300">Búsqueda</a>
                        <a routerLink="/detalle" routerLinkActive="bg-primary text-light"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="rounded-full px-3 py-2 text-sm font-medium text-gray hover:scale-105  hover:text-light transition-all duration-300">Detalle</a>
                        <a routerLink="/reserva" routerLinkActive="bg-primary text-light"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="rounded-full px-3 py-2 text-sm font-medium text-gray hover:scale-105 hover:text-light transition-all duration-300">Reserva</a>
                        <a routerLink="/confirmacion" routerLinkActive="bg-primary text-light"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="rounded-full px-3 py-2 text-sm font-medium text-gray hover:scale-105 hover:text-light transition-all duration-300">Confirmación</a>

                            [routerLinkActiveOptions]="{exact: true}"

    <!-- Menú Móvil Desplegable -->
    <div [class.hidden]="!isMobileMenuOpen()" class="sm:hidden bg-surface border-t border-white/10">
        <div class="space-y-1 px-2 pt-2 pb-3">
            <a href="/home" class="block rounded-md bg-surface px-3 py-2 text-base font-medium text-light">Inicio</a>
            <a href="/busqueda" class="block rounded-md px-3 py-2 text-base font-medium text-gray">Búsqueda</a>
            <a href="/detalle" class="block rounded-md px-3 py-2 text-base font-medium text-gray">Detalle</a>
            <a href="/reserva" class="block rounded-md px-3 py-2 text-base font-medium text-gray">Reserva</a>
            <a href="/confirmacion" class="block rounded-md px-3 py-2 text-base font-medium text-gray">Confirmación</a>
            <a href="/admin" class="block rounded-md px-3 py-2 text-base font-medium text-gray">Admin</a>
        </div>
    </div>
</nav>
